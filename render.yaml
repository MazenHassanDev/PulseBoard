# Render Blueprint for PulseBoard.
# Creates four resources: a Postgres database, a Key Value (Redis) instance,
# the Django API web service, and the React/Vite static site.
#
# After the first deploy, set these "sync: false" values in the Render dashboard:
#   pulseboard-api:  ANTHROPIC_API_KEY, CORS_ALLOWED_ORIGINS, CSRF_TRUSTED_ORIGINS
#   pulseboard-web:  VITE_API_URL, VITE_ACCESS_PASSWORD
# See README.md > Deployment for the exact values.

databases:
  - name: pulseboard-db
    plan: free
    databaseName: pulseboard
    user: pulseboard

services:
  # --- Redis / Key Value (used to cache dashboard results and AI explanations) ---
  - type: keyvalue
    name: pulseboard-redis
    plan: free
    ipAllowList: []          # only reachable from within Render's network
    maxmemoryPolicy: allkeys-lru

  # --- Django REST API ---
  - type: web
    name: pulseboard-api
    runtime: python
    plan: free
    rootDir: api
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn core.wsgi:application"
    healthCheckPath: /admin/login/
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pulseboard-redis
          type: keyvalue
          property: connectionString
      # Set in the dashboard after the frontend URL is known:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

  # --- React / Vite frontend (static site) ---
  - type: web
    name: pulseboard-web
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist
    envVars:
      # Set in the dashboard after the API URL is known:
      - key: VITE_API_URL
        sync: false
      - key: VITE_ACCESS_PASSWORD
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
